<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Home</title>
    <style>
      body {font-family: Arial, sans-serif; background:#eef2ff; margin:0; padding:0;}
      .content {max-width:720px; margin:72px auto; padding:32px; background:white; border-radius:12px; box-shadow:0 12px 30px rgba(0,0,0,0.08);}
      h1 {margin-top:0;}
      .button {display:inline-block; margin-top:24px; padding:12px 20px; background:#4f46e5; color:white; border-radius:8px; text-decoration:none;}
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Welcome, {{ username }}!</h1>
      <p>You are now logged in. Use the button below to sign out.</p>
      <a class="button" href="{{ url_for('logout') }}">Logout</a>
    </div>
  </body>
</html>
