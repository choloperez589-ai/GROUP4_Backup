{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="card shadow-sm border-0 p-4 w-100" style="max-width: 640px;">
    <div class="card-body text-center">
      <h1 class="display-5 mb-3">Access Denied</h1>
      <p class="lead text-muted">Your IP address <strong>{{ ip }}</strong> is not authorized to access this system.</p>
      <p>{{ reason }}</p>
      <a class="btn btn-primary mt-3" href="{{ url_for('auth.login') }}">Return to Login</a>
    </div>
  </div>
</div>
{% endblock %}
