<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live Camera Feed</title>
    <style>
      body { font-family: Arial, sans-serif; background: #111; margin: 0; padding: 0; }
      .container { max-width: 960px; margin: 30px auto; padding: 20px; }
      h1 { color: #fff; margin-top: 0; }
      .stream-container { background: #000; border-radius: 8px; overflow: hidden; }
      img { width: 100%; height: auto; display: block; }
      .status { padding: 10px; color: #aaa; text-align: center; margin-top: 12px; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Live Camera Feed</h1>
      <div class="stream-container">
        <img src="/cam/stream" alt="Live Camera Stream">
      </div>
      <div class="status">Live feed • No login required</div>
    </div>
  </body>
</html>
