[build]
builder = "dockerfile"
dockerfile = "Dockerfile"

[deploy]
startCommand = "python -m gunicorn app:app --worker-class=gthread --workers=1 --threads=4 --bind 0.0.0.0:8080 --timeout 120 --graceful-timeout 30"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
